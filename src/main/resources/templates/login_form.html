<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 소비 닥터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="text-center mb-4">소비 닥터 로그인</h2>
        <div class="card shadow">
            <div class="card-body p-4">
                <div th:if="${param.error}" class="alert alert-danger">
                    아이디 또는 비밀번호를 확인해주세요.
                </div>
                <form th:action="@{/user/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">아이디</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">비밀번호</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">로그인</button>
                </form>
            </div>
        </div>
        <p class="text-center mt-3">계정이 없으신가요? <a th:href="@{/user/signup}">회원가입</a></p>
    </div>
    <div class="mt-3 text-center">
        <hr>
        <p class="text-muted">소셜 계정으로 로그인</p>
        <a href="/oauth2/authorization/kakao" class="btn w-100" style="background-color: #FEE500; color: #000; font-weight: bold;">
            카카오로 1초 만에 시작하기
        </a>
    </div>
</div>
</body>
</html>
