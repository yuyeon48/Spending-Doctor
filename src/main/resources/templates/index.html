<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>소비 닥터 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="container mt-5">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">소비 닥터</a>
        <div class="ms-auto">
            <div th:if="${#authorization.expression('isAnonymous()')}">
                <a th:href="@{/user/signup}" class="btn btn-outline-primary me-2">회원가입</a>
                <a th:href="@{/user/login}" class="btn btn-primary">로그인</a>
            </div>
            <div th:if="${#authorization.expression('isAuthenticated()')}" class="d-flex align-items-center">
                <span class="me-3 fw-bold">
                    <span th:text="${#authentication.name}"></span>님 환영합니다!
                </span>
                <a th:href="@{/user/logout}" class="btn btn-outline-danger">로그아웃</a>
            </div>
        </div>
    </div>
</nav>

<div class="p-5 mb-4 bg-light rounded-3 text-center shadow-sm">
    <h1 class="display-5 fw-bold">🩺 소비 닥터 진단 결과</h1>
    <p class="fs-4 mt-3" th:text="${advice}"></p>
</div>

<div th:if="${#authorization.expression('isAuthenticated()')}" class="card mb-5 border-primary shadow-sm">
    <div class="card-body">
        <h5 class="card-title mb-3">새로운 지출 기록하기 </h5>
        <form action="/add" method="post" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="storeName" class="form-control" placeholder="상호명" required>
            </div>
            <div class="col-md-3">
                <input type="number" name="amount" class="form-control" placeholder="금액(원)" required>
            </div>
            <div class="col-md-3">
                <select name="category" class="form-select">
                    <option value="식비">식비</option>
                    <option value="카페">카페</option>
                    <option value="쇼핑">쇼핑</option>
                    <option value="교통">교통</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">저장</button>
            </div>
        </form>
    </div>
</div>

<div th:if="${#authorization.expression('isAnonymous()')}" class="alert alert-info text-center mb-5">
    지출 내역을 기록하려면 <a th:href="@{/user/login}" class="alert-link">로그인</a>이 필요합니다. 
</div>

<div th:if="${#authorization.expression('isAuthenticated()')}" class="row">
    <div class="col-md-6">
        <h3>나의 지출 내역</h3>
        <table class="table table-hover mt-3">
            <thead class="table-dark">
            <tr>
                <th>상호명</th>
                <th>금액</th>
                <th>카테고리</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx.storeName}"></td>
                <td th:text="${#numbers.formatInteger(tx.amount, 0, 'COMMA')} + '원'"></td>
                <td th:text="${tx.category}"></td>
                <td>
                    <a th:href="@{/delete/{id}(id=${tx.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="col-md-6 text-center">
        <h3>카테고리별 비중</h3>
        <canvas id="myChart" class="mt-3" style="max-height: 350px;"></canvas>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const transactions = /*[[${transactions}]]*/ [];
    /*]]>*/

    if (transactions && transactions.length > 0) {
        const categoryMap = {};
        transactions.forEach(tx => {
            categoryMap[tx.category] = (categoryMap[tx.category] || 0) + tx.amount;
        });

        const labels = Object.keys(categoryMap);
        const dataValues = Object.values(categoryMap);

        new Chart(document.getElementById('myChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C2', '#9966FF'],
                    hoverOffset: 10
                }]
            }
        });
    }
</script>
</body>
</html>
